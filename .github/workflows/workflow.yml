name: Deploy

on:
  push:
    branches:
      - main
    paths-ignore:
      - ".github/workflows/**"
      - "README.md"
      - "Makefile"
      - ".gitignore"
      - ".devcontainer/**"
      - ".vscode/**"

env:
  PUBLIC_ALGOLIA_APP_ID: XE8PCLJHAE
  PUBLIC_ALGOLIA_SEARCH_API_KEY: ec75de1d8ce87dee234a2fd47cec2d76
  PUBLIC_ALGOLIA_INDEX_NAME: cloudbytes_dev
  PUBLIC_GOOGLE_ANALYTICS_ID: G-9VKX48YDBH

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Build Astro site
        working-directory: web
        run: npm run build

      - name: Run tests (Vitest)
        working-directory: web
        run: npm test

      - name: Update Algolia index
        working-directory: web
        env:
          ALGOLIA_ADMIN_API_KEY: "${{ secrets.ALGOLIA_ADMIN_API_KEY }}"
        run: node scripts/algolia-index.mjs

      - name: Upload the Build Files
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            web/dist/
            .firebaserc
            firebase.json
          retention-days: 1
          include-hidden-files: true
  deploy:
    name: Deploy
    needs: [build]
    runs-on: ubuntu-latest
    environment:
      name: cloudbytes.dev
      url: https://cloudbytes.dev
    steps:
      - name: Download the Build
        uses: actions/download-artifact@v4
        with:
          name: build-output
      - name: Deploy to Firebase
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: "${{ secrets.GITHUB_TOKEN }}"
          firebaseServiceAccount: "${{ secrets.FIREBASE_SERVICE_ACCOUNT_CLOUDBYTES_PROD }}"
          channelId: live
          projectId: cloudbytes-prod
